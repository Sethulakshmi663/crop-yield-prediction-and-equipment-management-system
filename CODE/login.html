{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="text-center mb-4">
        <span style="font-size:3rem">🌾</span>
        <h2 style="font-family:'Playfair Display',serif;color:var(--forest);margin:.5rem 0 .25rem">Welcome Back</h2>
        <p class="text-muted-earth">Sign in to your SmartAgri Pro account</p>
      </div>
      <div class="card">
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-forest w-100 py-2 mb-3">
              <i class="fa fa-sign-in-alt me-2"></i>Sign In
            </button>
            <p class="text-center text-muted-earth" style="font-size:.83rem">
              Don't have an account? <a href="{{ url_for('register') }}" class="text-forest" style="font-weight:600">Register here</a>
            </p>
          </form>
        </div>
      </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
